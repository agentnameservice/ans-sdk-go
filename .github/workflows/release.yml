# Automatically creates release PRs and, when a release-please release lands,
# builds and uploads ans-cli binaries to that release in the same workflow run.
#
# Why these are combined: events triggered by GITHUB_TOKEN (such as
# release-please publishing a release) do NOT trigger downstream workflows.
# Splitting goreleaser into its own `release: published` workflow silently
# never fires. Running goreleaser as a needs:-gated job in the same workflow
# avoids this entirely without requiring a PAT.
# Docs: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
name: Release

on:
  push:
    branches:
      - main
  # Manual trigger for recovery scenarios (e.g., re-running after a failed release).
  workflow_dispatch:

# contents:write is required for creating git tags, GitHub Releases, and uploading release assets.
# pull-requests:write is required for creating and updating release PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    name: Build & upload ans-cli
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history + tags so `git describe` resolves the version.
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          # Floats to the latest v2.x release on each run. Latest as of 2026-05-01: v2.15.4.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_ANS_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_ANS_GITHUB_TOKEN }}
          SCOOP_BUCKET_ANS_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_ANS_GITHUB_TOKEN }}
