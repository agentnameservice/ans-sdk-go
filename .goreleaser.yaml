# GoReleaser config for the ans-cli binary.
# Library consumers continue to use `go get` / module versions — only the CLI is packaged here.
# Docs: https://goreleaser.com/customization/
version: 2

project_name: ans-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: ans-cli
    main: ./cmd/ans-cli
    binary: ans-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/godaddy/ans-sdk-go/cmd/ans-cli/cmd.version={{.Version}}
      - -X github.com/godaddy/ans-sdk-go/cmd/ans-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/godaddy/ans-sdk-go/cmd/ans-cli/cmd.date={{.Date}}

archives:
  - id: ans-cli
    ids:
      - ans-cli
    name_template: "ans-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - src: cmd/ans-cli/README.md
        dst: README.md

brews:
  - name: ans-cli
    ids:
      - ans-cli
    repository:
      owner: godaddy
      name: homebrew-ans
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_ANS_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/godaddy/ans-sdk-go"
    description: "Command-line tool for the Agent Name Service (ANS) Registry"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): ans-cli {{ .Tag }}"
    install: |
      bin.install "ans-cli"
    test: |
      system "#{bin}/ans-cli", "--version"

scoops:
  - name: ans-cli
    ids:
      - ans-cli
    repository:
      owner: godaddy
      name: scoop-ans
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_ANS_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/godaddy/ans-sdk-go"
    description: "Command-line tool for the Agent Name Service (ANS) Registry"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(scoop): ans-cli {{ .Tag }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

# release-please owns the changelog and the GitHub Release body.
# GoReleaser only attaches binaries + checksums to the existing release.
changelog:
  disable: true

release:
  mode: append
  github:
    owner: godaddy
    name: ans-sdk-go
